global:
  scrape_interval: 15s      # Ambil metrics tiap 15 detik
  evaluation_interval: 15s  # Evaluasi alert tiap 15 detik

rule_files:
  - "alert_rules.yml"       # File berisi aturan alert

scrape_configs:
  - job_name: 'demo-app'
    static_configs:
      - targets: ['demo-app:8080']
    
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']